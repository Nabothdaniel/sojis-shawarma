name: Deploy to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend export
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_ENCRYPTION_KEY: ${{ secrets.NEXT_PUBLIC_ENCRYPTION_KEY }}
        run: npm run build

      - name: Prepare backend deploy bundle
        run: |
          mkdir -p deploy/api
          cp -R backend/src deploy/api/
          cp -R backend/routes deploy/api/
          cp -R backend/config deploy/api/
          cp backend/public/index.php deploy/api/index.php
          cp backend/public/.htaccess deploy/api/.htaccess

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: cpanel-deploy
          path: |
            out
            deploy/api

  deploy:
    runs-on: ubuntu-latest
    needs: build

    env:
      CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
      CPANEL_USER: ${{ secrets.CPANEL_USER }}
      FRONTEND_PATH: /home/${{ secrets.CPANEL_USER }}/public_html
      BACKEND_PATH: /home/${{ secrets.CPANEL_USER }}/public_html/api

    steps:
      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: cpanel-deploy
          path: dist

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.CPANEL_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$CPANEL_HOST" >> ~/.ssh/known_hosts

      - name: Create remote directories
        run: |
          ssh "$CPANEL_USER@$CPANEL_HOST" "mkdir -p '$FRONTEND_PATH' '$BACKEND_PATH' '$BACKEND_PATH/storage' '$BACKEND_PATH/storage/logs' '$BACKEND_PATH/storage/cache'"

      - name: Deploy frontend export
        run: |
          rsync -az --delete \
            --exclude 'api/' \
            --exclude '.well-known/' \
            dist/out/ "$CPANEL_USER@$CPANEL_HOST:$FRONTEND_PATH/"

      - name: Deploy backend application
        run: |
          rsync -az --delete dist/deploy/api/src/ "$CPANEL_USER@$CPANEL_HOST:$BACKEND_PATH/src/"
          rsync -az --delete dist/deploy/api/routes/ "$CPANEL_USER@$CPANEL_HOST:$BACKEND_PATH/routes/"
          rsync -az --delete dist/deploy/api/config/ "$CPANEL_USER@$CPANEL_HOST:$BACKEND_PATH/config/"
          rsync -az dist/deploy/api/index.php "$CPANEL_USER@$CPANEL_HOST:$BACKEND_PATH/index.php"
          rsync -az dist/deploy/api/.htaccess "$CPANEL_USER@$CPANEL_HOST:$BACKEND_PATH/.htaccess"

      - name: Upload backend environment file
        run: |
          printf '%s' "${{ secrets.CPANEL_BACKEND_ENV }}" > backend.env
          scp backend.env "$CPANEL_USER@$CPANEL_HOST:$BACKEND_PATH/.env"
          rm -f backend.env
